<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <div class="containerEsquerdo">
        <div class="conteudo-principal">
            <h1>BEM VINDO NOVAMENTE AO AKAHAI!</h1>
            <p>Caso já possua cadastro, faça login clicando no botão abaixo.</p>
            <button><a href="../Login/login.html">Entrar</a></button>
        </div>

        <a href="../Inicio/inicio.html">VOLTAR</a>
    </div>

    <div class="containerDireito">
        <div class="titulo-direito">
            <h2>Entrar</h2>
        </div>

        <div class="formulario">
            <p>Nome completo:</p>
            <input type="text" class="inputs-geral" id="ipt_nome">
            <p>Email:</p>
            <input type="text" class="inputs-geral" id="ipt_email">
            <p>Senha:</p>
            <input type="text" class="inputs-geral" id="ipt_senha">
            <p>Confirme a senha:</p>
            <input type="text" class="inputs-geral" id="ipt_confirmarSenha">
            <p>Você já é surfista?</p>
            <input type="text" class="inputs-geral" id="ipt_surfista">
        </div>

        <button class="btn-entrar">Entrar</button>
    </div>
</body>

</html>
