<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;500;600&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/quiz/resultado.css">
    <link rel="icon" href="../../Assets/Img/icons/Akahai-ico.svg">

    <script src="../../JS/quiz.js"></script>

    <title>Akahai | Quiz</title>
</head>

<body onload="verResultado()">
    
    <div id="meuPopUp" class="popUp-fundo escondido">
        <div class="popUp-container">
            <h3>Aviso do Akahai</h3>
            <p id="textoDoPopUp">(mensagem de aviso genérica)</p>
        </div>
    </div>

    <main>
        <div class="container-video">
            <audio id="musicaFundo" autoplay loop>
                <source src="../Assets/Audio/mac-de-marco.mp3" type="audio/mpeg">
            </audio>

            <video class="main-video" autoplay loop>
                <source src="../../Assets/Video/quiz.mp4" type="video/mp4">
            </video>

            <div class="container-unico">
                <h1>FIM DA BATERIA!</h1>

                <div class="placar-final">
                    <div class="topicos-placar">
                        <p>Total de perguntas: <b>5</b></p>
                        <p>Total de acertos: <b><span id="spanAcertos"></span></b></p>
                        <p>Total de erros: <b><span id="spanErros"></span></b></p>
                    </div>

                    <h2 id="mensagemFinal" class="msg-destaque"></h2>
                </div>


                <div class="buttons">
                    <button class="btn-jogarNovamente" onclick="jogarNovamente('p1.html')">JOGAR NOVAMENTE</button>
                    <button class="btn-telaInicial" onclick="telaInicial('dashboard.html')">CONFERIR MÉTRICAS</button>
                </div>
            </div>
        </div>

    </main>

</body>

</html>
