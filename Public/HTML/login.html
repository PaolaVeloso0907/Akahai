<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;500;600&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="icon" href="../Assets/Img/icons/Akahai-ico.svg">

    <script src="../JS/login.js"></script>

    <title>Akahai | Login</title>
</head>

<body>
    <main>
        <div class="containerEsquerdo">
            <h1>BEM VINDO NOVAMENTE AO AKAHAI!</h1>
            <p>Caso ainda não possua uma conta, <br> crie sua conta clicando no botão abaixo.</p>
            <a href="../HTML/cadastro.html">
                <button class="btn-cadastar">Cadastrar</button>
            </a>
        </div>

        <div class="containerDireito">
            <div class="container-formulario">
                <h2>Entrar</h2>
                <p>Email:</p>
                <input type="text" class="inputs-geral" id="ipt_email" placeholder="Ex: gabriel.medina@email.com">
                <p>Senha:</p>
                <input type="password" class="inputs-geral" id="ipt_senha">

                <p id="mensagem_login"></p>

                <div class="forms-voltar-entrar">

                    <button class="btn-entrar" onclick="entrar()">Entrar</button>

                    <small>Deseja voltar a tela inicial? <a href="../HTML/index.html"> Clique aqui</a></small>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
