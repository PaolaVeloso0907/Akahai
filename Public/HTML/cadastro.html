<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;500;600&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../CSS/cadastro.css">
    <link rel="icon" href="../Assets/Img/icons/Akahai-ico.svg">

    <script src="../JS/cadastro.js"></script>

    <title>Akahai | Cadastro</title>
</head>

<body>
    <main>
        <div class="containerEsquerdo">
            <h1>BEM VINDO AO AKAHAI!</h1>
            <p>Caso já possua cadastro, <br> faça login clicando no botão abaixo.</p>
            <a href="../HTML/login.html">
                <button class="btn-login">Entrar</button>
            </a>
        </div>

        <div class="containerDireito">
            <div class="container-form">
                <h2>Cadastrar</h2>
                <p>Nome completo:</p>
                <input type="text" class="inputs-geral" id="ipt_nome" placeholder="Ex: Gabriel Medina...">
                <p>Email:</p>
                <input type="text" class="inputs-geral" id="ipt_email" placeholder="Ex: gabriel.medina@email.com">
                <p>Senha:</p>
                <input type="password" class="inputs-geral" id="ipt_senha">
                <p>Confirme a senha:</p>
                <input type="password" class="inputs-geral" id="ipt_confirmarSenha">
                <p>Você já é surfista?</p>
                <select class="inputs-geral" id="ipt_surfista">
                    <option value="#">Selecione uma opção...</option>
                    <option value="nãoSabe">Nunca surfei, mas gostaria de aprender</option>
                    <option value="sabe">Sei sim, surfo sempre que posso</option>
                    <option value="robertoCarlos">Só quando o Roberto Carlos descongela para cantar!</option>
                </select>

                <p id="mensagem_cadastro"></p>

                <div class="forms-voltar-entrar">
                    <button class="btn-entrar" onclick="cadastrar()">Cadastrar</button>

                    <small>Deseja voltar a tela inicial? <a href="../HTML/index.html"> Clique aqui</a></small>
                </div>

            </div>
        </div>

    </main>

</body>

</html>
